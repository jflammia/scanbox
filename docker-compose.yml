services:
  scanbox:
    build: .
    ports:
      - "8090:8090"
    env_file:
      - path: .env
        required: false
    volumes:
      - scanbox-data:/app/data
      - ${OUTPUT_DIR:-./output}:/output
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; httpx.get('http://localhost:8090/api/health').raise_for_status()"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  scanbox-data:
