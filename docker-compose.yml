services:
  scanbox:
    build: .
    network_mode: host
    env_file:
      - path: .env
        required: false
    environment:
      # network_mode: host means no port mapping — app binds directly to host:8090
      - UVICORN_HOST=0.0.0.0
      - UVICORN_PORT=8090
    volumes:
      - scanbox-data:/app/data
      - ${OUTPUT_DIR:-./output}:/output
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; httpx.get('http://localhost:8090/api/health').raise_for_status()"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  scanbox-data:
