# Forgejo Actions CI for ScanBox
#
# Runs on self-hosted runners (peter/laurie on monica).
# Zero GitHub Actions minutes consumed.
#
# This file is synced from GitHub via mirror — safe to commit
# to the GitHub repo since GitHub Actions ignores .gitea/ directories.

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: linux
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install ruff
        run: pip install ruff

      - name: Run ruff check
        run: ruff check scanbox/ tests/

      - name: Run ruff format check
        run: ruff format --check scanbox/ tests/

  test:
    name: Test
    runs-on: linux
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y tesseract-ocr tesseract-ocr-eng ghostscript poppler-utils

      - name: Install dependencies
        run: pip install -e ".[dev]" coverage

      - name: Generate test fixtures
        run: python -m tests.generate_fixtures

      - name: Run tests with coverage
        run: coverage run --source=scanbox -m pytest --tb=short -q

      - name: Coverage summary
        run: coverage report --fail-under=85

  docker-build:
    name: Docker Build
    runs-on: docker
    steps:
      - uses: actions/checkout@v4

      - name: Build image
        run: docker build -t scanbox:test .
