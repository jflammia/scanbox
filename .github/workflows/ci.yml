name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install ruff
        run: pip install ruff

      - name: Run ruff check
        run: ruff check scanbox/ tests/

      - name: Run ruff format check
        run: ruff format --check scanbox/ tests/

  test:
    name: Test
    runs-on: ubuntu-latest
    # Skip on docs/template-only changes (lint still runs)
    if: >-
      github.event_name == 'push' ||
      !contains(github.event.pull_request.title, '[skip test]')
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y tesseract-ocr tesseract-ocr-eng ghostscript poppler-utils

      - name: Install dependencies
        run: pip install -e ".[dev]" coverage

      - name: Generate test fixtures
        run: python -m tests.generate_fixtures

      - name: Run tests with coverage
        run: coverage run --source=scanbox -m pytest --tb=short -q

      - name: Generate coverage report
        run: |
          echo "## Test Coverage Report" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          coverage report --skip-empty >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: Coverage summary
        run: |
          coverage report --fail-under=85
          coverage json -o coverage.json

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v7
        with:
          name: coverage-report
          path: coverage.json

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    # Only build Docker when source, Dockerfile, or deps change
    if: >-
      github.event_name == 'push' ||
      !contains(github.event.pull_request.title, '[skip docker]')
    steps:
      - uses: actions/checkout@v6

      - name: Build image
        run: docker build -t scanbox:test .
