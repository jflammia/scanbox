<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 180" fill="none">
  <!-- Scanner body -->
  <rect x="20" y="80" width="200" height="80" rx="12" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="2"/>
  <!-- ADF tray -->
  <rect x="40" y="60" width="160" height="24" rx="4" fill="#e2e8f0" stroke="#cbd5e1" stroke-width="1.5"/>
  <!-- Paper stack -->
  <rect x="60" y="20" width="100" height="40" rx="2" fill="white" stroke="#94a3b8" stroke-width="1.5" transform="rotate(-2 110 40)"/>
  <rect x="62" y="22" width="100" height="40" rx="2" fill="white" stroke="#94a3b8" stroke-width="1"/>
  <!-- Text lines on paper -->
  <line x1="74" y1="32" x2="140" y2="31" stroke="#cbd5e1" stroke-width="2" stroke-linecap="round"/>
  <line x1="74" y1="40" x2="130" y2="39" stroke="#cbd5e1" stroke-width="2" stroke-linecap="round"/>
  <line x1="74" y1="48" x2="120" y2="47" stroke="#cbd5e1" stroke-width="2" stroke-linecap="round"/>
  <!-- Arrow pointing down into tray -->
  <path d="M120 10 L120 55" stroke="#2563eb" stroke-width="2.5" stroke-linecap="round" marker-end="url(#arrowhead)"/>
  <defs>
    <marker id="arrowhead" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#2563eb"/>
    </marker>
  </defs>
  <!-- Label -->
  <text x="120" y="135" font-family="system-ui, sans-serif" font-size="13" fill="#475569" text-anchor="middle" font-weight="500">Face up</text>
</svg>
