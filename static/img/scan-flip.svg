<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 180" fill="none">
  <!-- Paper stack (before) -->
  <rect x="20" y="50" width="80" height="60" rx="3" fill="white" stroke="#94a3b8" stroke-width="1.5"/>
  <line x1="32" y1="65" x2="80" y2="65" stroke="#cbd5e1" stroke-width="2" stroke-linecap="round"/>
  <line x1="32" y1="75" x2="72" y2="75" stroke="#cbd5e1" stroke-width="2" stroke-linecap="round"/>
  <line x1="32" y1="85" x2="68" y2="85" stroke="#cbd5e1" stroke-width="2" stroke-linecap="round"/>
  <!-- Flip arrow -->
  <path d="M115 50 C140 20, 160 20, 165 50" stroke="#2563eb" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <path d="M165 50 L160 40 M165 50 L172 44" stroke="#2563eb" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M115 110 C140 140, 160 140, 165 110" stroke="#2563eb" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <path d="M115 110 L122 116 M115 110 L120 102" stroke="#2563eb" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Paper stack (after - flipped, face down) -->
  <rect x="140" y="50" width="80" height="60" rx="3" fill="#f8fafc" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="180" y="84" font-family="system-ui, sans-serif" font-size="11" fill="#94a3b8" text-anchor="middle">Face down</text>
  <!-- Labels -->
  <text x="60" y="140" font-family="system-ui, sans-serif" font-size="12" fill="#475569" text-anchor="middle" font-weight="500">Before</text>
  <text x="180" y="140" font-family="system-ui, sans-serif" font-size="12" fill="#475569" text-anchor="middle" font-weight="500">After</text>
  <text x="140" y="170" font-family="system-ui, sans-serif" font-size="13" fill="#2563eb" text-anchor="middle" font-weight="600">Flip the stack over</text>
</svg>
