<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}ScanBox{% endblock %}</title>
  <link rel="stylesheet" href="/static/css/app.css">
  <script defer src="/static/js/alpine.min.js"></script>
  <script src="/static/js/htmx.min.js"></script>
  <script src="/static/js/idiomorph-ext.min.js"></script>
</head>
<body class="bg-surface text-text-primary min-h-screen" hx-ext="morph">
  <a href="#main" class="sr-only focus:not-sr-only focus:absolute focus:z-50 focus:p-4 focus:bg-white">Skip to content</a>

  <header class="max-w-4xl mx-auto px-4 py-4 flex items-center justify-between">
    <a href="/" class="flex items-center gap-2 no-underline">
      <img src="/static/img/logo.svg" alt="ScanBox" class="h-8" onerror="this.style.display='none'">
      <span class="text-2xl font-bold text-brand-600 sr-only">ScanBox</span>
    </a>
    <nav>
      <a href="/settings" class="text-text-secondary hover:text-text-primary text-sm no-underline">Settings</a>
    </nav>
  </header>

  {% block breadcrumb %}{% endblock %}

  <main id="main" class="max-w-4xl mx-auto px-4 py-6">
    {% block content %}{% endblock %}
  </main>

  <footer class="max-w-4xl mx-auto px-4 py-3 mt-8 border-t border-border">
    <div class="flex items-center justify-between">
      <div id="scanner-status"
           hx-get="/scanner/status"
           hx-trigger="load, every 5s"
           hx-swap="innerHTML"
           class="text-sm text-text-muted flex items-center gap-2">
        Checking scanner...
      </div>
      <div class="text-xs text-text-muted" title="For her — always.">Made with care</div>
    </div>
  </footer>

  {# Toast notification system #}
  <div id="toast-container"
       x-data="toastManager()"
       @show-toast.window="addToast($event.detail)"
       class="fixed bottom-4 right-4 z-50 space-y-2 pointer-events-none"
       aria-live="polite">
    <template x-for="toast in toasts" :key="toast.id">
      <div x-show="toast.visible"
           x-transition:enter="transition ease-out duration-300"
           x-transition:enter-start="opacity-0 translate-y-2"
           x-transition:enter-end="opacity-100 translate-y-0"
           x-transition:leave="transition ease-in duration-200"
           x-transition:leave-start="opacity-100"
           x-transition:leave-end="opacity-0"
           class="pointer-events-auto px-4 py-3 rounded-lg shadow-lg text-white text-sm font-medium cursor-pointer max-w-sm"
           :class="{
             'bg-status-success': toast.type === 'success',
             'bg-status-error': toast.type === 'error',
             'bg-status-warning text-gray-900': toast.type === 'warning',
             'bg-brand-600': toast.type === 'info' || !toast.type
           }"
           @click="removeToast(toast.id)"
           x-text="toast.message">
      </div>
    </template>
  </div>

  <script>
  function toastManager() {
    return {
      toasts: [],
      nextId: 0,
      addToast(detail) {
        const id = this.nextId++;
        this.toasts.push({
          id,
          message: detail.message || detail,
          type: detail.type || 'info',
          visible: true
        });
        setTimeout(() => this.removeToast(id), 5000);
      },
      removeToast(id) {
        const toast = this.toasts.find(t => t.id === id);
        if (toast) toast.visible = false;
        setTimeout(() => {
          this.toasts = this.toasts.filter(t => t.id !== id);
        }, 300);
      }
    };
  }

  // Bridge htmx HX-Trigger showToast events to Alpine
  document.body.addEventListener('showToast', function(e) {
    window.dispatchEvent(new CustomEvent('show-toast', { detail: e.detail }));
  });
  </script>
</body>
</html>
